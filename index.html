<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Voting System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6f8ff, #d6e4ff);
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
            padding: 30px;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            text-align: center;
        }

        .description {
            text-align: center;
            color: #4b5563;
            margin-bottom: 24px;
        }

        .candidate {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-bottom: 12px;
            background: #f9fafb;
        }

        .candidate input {
            margin-right: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .status {
            margin-top: 18px;
            padding: 16px;
            border-radius: 12px;
            background-color: #eff6ff;
            color: #1d4ed8;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Online Voting</h1>
        <p class="description">Choose one candidate and submit your vote. This is a simple voting demo for learning
            purposes.</p>

        <form id="voteForm">
            <label class="candidate">
                <span>
                    <input type="radio" name="candidate" value="Alice Johnson" required>
                    Alice Johnson
                </span>
                <span>Party A</span>
            </label>

            <label class="candidate">
                <span>
                    <input type="radio" name="candidate" value="Brian Smith">
                    Brian Smith
                </span>
                <span>Party B</span>
            </label>

            <label class="candidate">
                <span>
                    <input type="radio" name="candidate" value="Carla Martinez">
                    Carla Martinez
                </span>
                <span>Independent</span>
            </label>

            <button type="submit">Submit Vote</button>
        </form>

        <div id="status" class="status"></div>
    </div>

    <script>
        const voteForm = document.getElementById('voteForm');
        const statusBox = document.getElementById('status');

        voteForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const formData = new FormData(voteForm);
            const selectedCandidate = formData.get('candidate');

            statusBox.textContent = 'Thank you! Your vote for ' + selectedCandidate + ' has been recorded.';
            statusBox.style.display = 'block';
        });
    </script>
</body>

</html>
